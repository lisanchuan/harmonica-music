# Nginx 配置 - harmonica-music + tuner
server {
    listen 80;
    server_name _;

    # Mock API 响应: /tuner/api-mock/tenholes/opern/attributes
    location /tuner/api-mock/tenholes/opern/attributes {
        default_type application/json;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Headers "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        return 200 '{"code":2000,"message":"操作成功","data":{"harmonicon":[{"label":"十孔标准调音","value":1,"harmonica_type":"harmonica","harmonica_id":"standard","config":{"tag_color":"#F7A800"}},{"label":"十孔 Paddy 调音","value":2,"harmonica_type":"harmonica","harmonica_id":"paddy","config":{"tag_color":"#F7A800"}},{"label":"十孔 Country 调音","value":3,"harmonica_type":"harmonica","harmonica_id":"country","config":{"tag_color":"#F7A800"}},{"label":"十孔 Melody maker 调音","value":4,"harmonica_type":"harmonica","harmonica_id":"melodyMaker","config":{"tag_color":"#F7A800"}},{"label":"十二孔半音阶口琴","value":5,"harmonica_type":"chromatic","harmonica_id":"standard","config":{"tag_color":"#504589"}},{"label":"复音口琴","value":6,"harmonica_type":"doubletone","harmonica_id":"standard","config":{"tag_color":"#504589"}}],"tune":[{"label":"G","value":1},{"label":"A","value":2},{"label":"B","value":3},{"label":"C","value":4},{"label":"D","value":5},{"label":"E","value":6},{"label":"F","value":7}],"position":[{"label":"第一把位","value":1},{"label":"第二把位","value":2},{"label":"第三把位","value":3},{"label":"第四把位","value":4},{"label":"第五把位","value":5},{"label":"第六把位","value":6},{"label":"第七把位","value":7},{"label":"第八把位","value":8},{"label":"第九把位","value":9},{"label":"第十把位","value":10},{"label":"第十一把位","value":11},{"label":"第十二把位","value":12}],"free_type":[{"label":"免费","value":1},{"label":"单独付费","value":2},{"label":"会员免费","value":3},{"label":"高级会员免费","value":4}],"difficulty":[{"label":"一星","value":1},{"label":"一星半","value":1.5},{"label":"二星","value":2},{"label":"二星半","value":2.5},{"label":"三星","value":3},{"label":"三星半","value":3.5},{"label":"四星","value":4},{"label":"四星半","value":4.5},{"label":"五星","value":5}],"state":[{"label":"上架","value":1},{"label":"下架","value":5}],"is_selected":[{"label":"是","value":1},{"label":"否","value":5}]}}';
    }

    # 通用 API mock 回退
    location /tuner/api-mock/ {
        default_type application/json;
        add_header Access-Control-Allow-Origin * always;
        return 200 '{"code":2000,"message":"ok","data":{}}';
    }

    # 主站 + tuner 静态资源 → Next.js app
    location / {
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
